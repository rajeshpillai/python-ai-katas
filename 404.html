<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Katas</title>
    <script>
      // SPA fallback for GitHub Pages: convert the unknown path into a
      // query string and redirect to the app's index.html, which then
      // restores the original URL via history.replaceState.
      // Adapted from https://github.com/rafgraph/spa-github-pages.
      // pathSegmentsToKeep = number of leading path segments that belong
      // to the base path (1 for /python-ai-katas/, 0 for custom domain).
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
