    <script>
      // SPA fallback decoder — pairs with public/404.html. When Pages
      // serves 404.html for a deep route, it redirects here with the
      // original path encoded in the query string. Restore it before
      // the router reads location.pathname.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>

          theme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.classList.add(theme);
      })();
